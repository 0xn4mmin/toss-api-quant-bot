# config/invariants.yaml — ISO-01: 사람만 편집한다.
# 유일한 로더는 src/quantbot/engine/invariants.py (IMPL-02 장치 2가 강제).
# 전략 파일은 이 파일의 어떤 필드도 겹치지 않는다 (IMPL-04).
#
# INV-07/09/10 수치는 2026-07-06 소유자 확정 (QUANTBOT-ARCH §4와 일치).
# 이 값들은 소액·백테스트 전 단계의 보수적 초기값이며,
# 페이퍼/live 승격 전에 재검토 대상이다.

version: 1

position:
  max_weight_pct: 12          # INV-01 — 종목당 비중 상한
  max_leverage: 0             # INV-02 — 레버리지 금지

universe:
  whitelist_only: true        # INV-03 — 화이트리스트 유니버스만
  kr_path: "universe/kr.yaml"
  us_path: "universe/us.yaml"

backtest:
  max_mdd_pct: 15             # INV-04 — 백테스트 MDD 상한

rebalance:
  min_interval_days: 7        # INV-05 — 리밸런싱 주기 하한 (주 1회)

turnover:
  auto_approve_max_pct: 50    # INV-06 — 전략 전환 회전율 자동승인 상한

circuit_breaker:
  daily_loss_pct: 3           # INV-07 — 일일 손실 -3% 도달 시 전 주문 동결 (확정 초기값)

lifecycle:
  auto_approve_requires_paper: true   # INV-08 — 페이퍼 미통과 자동승인 금지

orders:
  daily_max_count: 20               # INV-09 — 일일 주문 횟수 하드캡 (확정 초기값)
  per_order_max_amount_krw: 1000000 # INV-10 — 1회 주문 금액 하드캡 (확정 초기값)
